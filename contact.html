    <!-- <h1 class="no-top-margin" style="text-align: center;">Contact Me</h1> -->

    <form class="form">
      <h3 style="margin: 5px 20px; text-align: center">Send a Message</h3>
      <label for="Full Name" style="margin: 5px 20px">Full Name</label>
      <input
        type="text"
        id="Full Name"
        placeholder="Full Name"
        style="margin: 5px 20px; padding: 5px; outline: grey"
      />
      <label for="Email" style="margin: 5px 20px">Email</label>
      <input
        type="email"
        id="Email"
        placeholder="you@example.com"
        style="margin: 5px 20px; padding: 5px; outline: grey"
      />
      <label for="Message" style="margin: 5px 20px">Message</label>
      <textarea
        id="Message"
        name="Message"
        cols="10"
        rows="5"
        placeholder="Your message here..."
        style="margin: 5px 20px; padding: 5px; outline: grey"
      ></textarea>
      <button
        type="submit"
        class="btn btn-primary"
        id="contact-submit"
        style="margin: 7px 20px 15px 20px; padding: 5px; outline: dodgerblue"
      >
        Send Message
      </button>
    </form>

    <footer>
      @2026 Malen Pride. "HTML, CSS & JavaScript."
      <i class="fa-brands fa-linkedin" style="margin-left: 30px"></i>
      <i class="fa-brands fa-x-twitter" style="margin-left: 10px"></i
      ><i class="fa-brands fa-github" style="margin-left: 10px"></i>

    <script

    <script>
      document.querySelector(".form").addEventListener("submit", function (e) {
        e.preventDefault();
        alert("Submitted Successfully!!");
      });
    </script>
